<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Gestão de Perdas</title>

<style>
body {
  font-family: Arial, sans-serif;
  background-color: #0d1117;
  color: #fff;
}

/* CONTAINER PRINCIPAL */
.perdas-container {
  padding: 20px;
}

/* TÍTULOS */
.perdas-container h2 {
  color: #00ffc3;
}

/* CARD */
.card {
  background-color: #161b22;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
}

/* INPUTS */
input, select {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  background: #0d1117;
  border: none;
  border-radius: 5px;
  color: #fff;
}

/* BOTÃO */
button {
  background-color: #00ffc3;
  color: #000;
  padding: 10px;
  border: none;
  border-radius: 5px;
  width: 100%;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background-color: #00cfa0;
}

/* TABELA */
table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
}

th {
  background-color: #21262d;
}

tr:nth-child(even) {
  background-color: #161b22;
}
</style>

</head>

<body>

<div class="perdas-container">

  <h2>Gestão de Perdas</h2>

  <!-- FORMULÁRIO -->
  <div class="card">
    <h3>Registrar Perda</h3>

    <form>
      <input type="text" placeholder="Nome do Produto">
      <input type="number" placeholder="Quantidade">

      <select>
        <option>Tipo de Perda</option>
        <option>Vencido</option>
        <option>Danificado</option>
        <option>Roubo</option>
        <option>Erro de estoque</option>
      </select>

      <input type="date">

      <button type="submit">Registrar</button>
    </form>
  </div>

  <!-- TABELA -->
  <div class="card">
    <h3>Histórico de Perdas</h3>

    <table>
      <thead>
        <tr>
          <th>Produto</th>
          <th>Quantidade</th>
          <th>Tipo</th>
          <th>Data</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td>Paracetamol</td>
          <td>10</td>
          <td>Vencido</td>
          <td>2026-04-20</td>
        </tr>

        <tr>
          <td>Vitamina C</td>
          <td>5</td>
          <td>Danificado</td>
          <td>2026-04-21</td>
        </tr>
      </tbody>
    </table>
  </div>

</div>

</body>
</html>
