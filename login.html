
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>VisionPharma | Terminal de Acesso</title>
    
    <link rel="stylesheet" href="global.css"> 
    <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">

    <style>
        :root {
            /* Tema Escuro Intenso */
            --bg-color: #020202;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text: #ffffff; 
            --dim: #444;
            --input-fill: rgba(255, 255, 255, 0.05);
            --status-off: #ff4444;
            --status-on: #00ffcc;
            --logo-filter: invert(1) brightness(1.8);
        }

        [data-theme="light"] {
            --bg-color: #f0f0f2;
            --card-bg: rgba(255, 255, 255, 0.7);
            --card-border: rgba(0, 0, 0, 0.06);
            --text-main: #000000;
            --text: #000000; 
            --dim: #999;
            --accent: #000000;
            --input-fill: rgba(0, 0, 0, 0.04);
            --logo-filter: none;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body, html {
            width: 100%; height: 100%;
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background 0.4s ease;
            font-family: "Inter", sans-serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        .ambient-bg {
            position: fixed; inset: 0;
            background: radial-gradient(circle at 50% 50%, var(--card-border) 0%, transparent 80%);
            z-index: 0;
        }

        /* BARRA SUPERIOR */
        .top-toolbar {
            position: absolute; top: 25px; right: 25px;
            display: flex; gap: 12px; z-index: 100;
        }

        .tool-btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            width: 42px; height: 42px;
            border-radius: 12px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s; backdrop-filter: blur(10px);
        }
        .tool-btn:hover { background: var(--input-fill); transform: translateY(-2px); }

        /* STATUS DO SERVIDOR */
        .server-status {
            position: absolute; top: 30px; left: 30px;
            display: flex; align-items: center; gap: 10px;
            font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
            color: var(--text-dim); z-index: 100; font-weight: 600;
        }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--status-off);
            box-shadow: 0 0 12px var(--status-off);
            transition: 0.5s;
        }
        .status-dot.online { background: var(--status-on); box-shadow: 0 0 12px var(--status-on); }

        /* CARD DE LOGIN */
        .login-card {
            position: relative; width: 90%; max-width: 400px;
            padding: 50px 40px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 35px;
            backdrop-filter: blur(30px);
            z-index: 10; text-align: center;
            transition: transform 0.3s ease;
        }

        .logo-login { 
            width: 130px; margin-bottom: 45px; 
            filter: var(--logo-filter); 
        }

        /* INPUT GROUPS E ÍCONES CORRIGIDOS */
        .input-group { position: relative; margin-bottom: 22px; text-align: left; }
        
        label {
            font-size: 10px; color: var(--text-dim);
            text-transform: uppercase; letter-spacing: 2px;
            margin-bottom: 10px; display: block; font-weight: 700;
        }

        .input-wrapper { position: relative; display: flex; align-items: center; }

        .input-wrapper i.field-icon {
            position: absolute; left: 18px;
            color: var(--text-dim); font-size: 15px;
            pointer-events: none;
        }

        .input-wrapper input {
            width: 100%; padding: 16px 45px 16px 48px;
            background: var(--input-fill);
            border: 1px solid var(--card-border);
            border-radius: 16px; color: var(--text-main);
            outline: none; transition: 0.3s; font-size: 15px;
        }

        .input-wrapper input:focus { 
            border-color: var(--text-main); 
            background: rgba(255,255,255,0.02); 
        }

        /* BOTÃO VER SENHA */
        .toggle-pass {
            position: absolute; right: 18px;
            color: var(--text-dim); cursor: pointer;
            padding: 5px; transition: 0.3s;
        }
        .toggle-pass:hover { color: var(--text-main); }

        /* BOTÃO PRINCIPAL */
        .btn-access {
            width: 100%; padding: 18px; background: var(--text-main);
            color: var(--bg-color); border: none; border-radius: 16px;
            font-weight: 800; text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; margin-top: 15px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-access:hover { transform: scale(1.02); filter: brightness(0.9); }
        
                /* 5. RODAPÉ (INSTITUCIONAL) */
        footer {
            position: absolute; bottom: 40px; width: 100%;
            text-align: center; z-index: 10;
            animation: fadeInFooter 2s ease forwards 1s; opacity: 0;
        }
        .footer-line {
            font-family: 'Inter', sans-serif; font-size: 9px;
            letter-spacing: 2px; color: var(--dim); line-height: 1.8;
            font-weight: 500;
        }
        .footer-line b { color: var(--text); opacity: 0.6; }

        @keyframes fadeInFooter { to { opacity: 1; } }


        /* PAINEL DE CONFIGURAÇÃO IP (CORRIGIDO) */
        #ip-panel {
            display: none; position: absolute; inset: 0;
            background: var(--bg-color); border-radius: 35px;
            padding: 40px; z-index: 60; flex-direction: column; justify-content: center;
            border: 1px solid var(--card-border);
        }
        #ip-panel.active { display: flex; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .ip-header { margin-bottom: 30px; }
        .ip-header i { font-size: 2.5rem; color: var(--text-main); margin-bottom: 15px; }
        .ip-header h2 { font-size: 14px; letter-spacing: 3px; color: var(--text-main); }

        /* LOADER */
        #boot-loader { display: none; padding: 40px 0; }
        .spinner { font-size: 24px; margin-bottom: 15px; animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .error-msg { color: var(--status-off); font-size: 12px; margin-top: 20px; font-weight: 600; display: none; }

    </style>
</head>
<body data-theme="dark">

    <div class="ambient-bg"></div>

    <div class="server-status">
        <div id="status-dot" class="status-dot"></div>
        <span id="status-text">Detectando Nodo...</span>
    </div>

    <div class="top-toolbar">
        <button class="tool-btn" onclick="toggleTheme()" title="Trocar Tema">
            <i class="fas fa-moon" id="theme-icon"></i>
        </button>
        <button class="tool-btn" onclick="toggleIP()" title="Configurações de Rede">
            <i class="fas fa-network-wired"></i>
        </button>
    </div>

    <div class="login-card">
        <div id="ip-panel">
            <div class="ip-header">
                <i class="fas fa-network-wired"></i>
                <h2>CONFIGURAÇÃO DO NODO</h2>
            </div>
            
            <div class="input-group">
                <label>Endereço IPv4 do Servidor</label>
                <div class="input-wrapper">
                    <i class="fas fa-link field-icon"></i>
                    <input type="text" id="ip-addr" placeholder="ex: 192.168.1.10">
                </div>
            </div>
            
            <button class="btn-access" onclick="saveIP()">
                <i class="fas fa-save"></i> SINCRONIZAR
            </button>
            <button onclick="toggleIP()" style="background:none; border:none; color:var(--text-dim); margin-top:20px; cursor:pointer; font-size:11px; font-weight:700; letter-spacing:1px;">VOLTAR AO TERMINAL</button>
        </div>

        <img src="assets/imagem/svg/logo.svg" alt="Pharmora" class="logo-login">

        <div id="login-fields">
            <div class="input-group">
                <label>Nome do Utilizador</label>
                <div class="input-wrapper">
                    <i class="fas fa-user-circle field-icon"></i>
                    <input type="text" id="user" placeholder="Insira o seu Nome" autocomplete="off">
                </div>
            </div>
            
            <div class="input-group">
                <label>Senha</label>
                <div class="input-wrapper">
                    <i class="fas fa-shield-alt field-icon"></i>
                    <input type="password" id="pass" placeholder="Digite a sua Senha">
                    <i class="fas fa-eye toggle-pass" onclick="togglePasswordVisibility()"></i>
                </div>
            </div>

            <button class="btn-access" onclick="handleLogin()">
                ACESSAR <i class="fas fa-chevron-right"></i>
            </button>
            <div id="error-log" class="error-msg"></div>
        </div>

        <div id="boot-loader">
            <div class="spinner"><i class="fas fa-sync-alt"></i></div>
            <div style="font-size:11px; letter-spacing:4px; font-weight:700;" id="loader-msg">VALIDANDO...</div>
        </div>
    </div>
    
     <footer>
        <div class="footer-line"><b>VISIONPHARMA V1.0.0.0</b> • BUILD BETA</div>
        <div class="footer-line">© VISIONPHARMA 2026 • TODOS DIREITOS RESERVADOS</div>
    </footer>

    <script>
        let serverIP = localStorage.getItem('pharmora_ip') || 'localhost';
        document.getElementById('ip-addr').value = serverIP;

        // 1. ALTERNAR TEMA
        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            const isDark = body.getAttribute('data-theme') === 'dark';
            
            body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        }

        // 2. VER/OCULTAR SENHA
        function togglePasswordVisibility() {
            const passInput = document.getElementById('pass');
            const toggleIcon = document.querySelector('.toggle-pass');
            
            if (passInput.type === 'password') {
                passInput.type = 'text';
                toggleIcon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passInput.type = 'password';
                toggleIcon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function toggleIP() { document.getElementById('ip-panel').classList.toggle('active'); }

        function saveIP() {
            serverIP = document.getElementById('ip-addr').value;
            localStorage.setItem('pharmora_ip', serverIP);
            toggleIP();
            checkServerStatus();
        }

        // 3. PING DE STATUS (MELHORADO)
        async function checkServerStatus() {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 2000);

                await fetch(`http://${serverIP}/pharmora/api_login.php`, { 
                    method: 'OPTIONS', 
                    signal: controller.signal 
                });
                
                dot.classList.add('online');
                text.textContent = "Servidor Conectado";
                text.style.color = "var(--status-on)";
            } catch (e) {
                dot.classList.remove('online');
                text.textContent = "Servidor Offline";
                text.style.color = "var(--status-off)";
            }
        }
        setInterval(checkServerStatus, 5000);
        checkServerStatus();

        // 4. LÓGICA DE LOGIN
        async function handleLogin() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            const loader = document.getElementById('boot-loader');
            const fields = document.getElementById('login-fields');
            const errorLog = document.getElementById('error-log');

            if(!user || !pass) { 
                errorLog.textContent = "INSIRA OS TEUS DADOS PARA PROSSEGUIR"; 
                errorLog.style.display = 'block';
                return; 
            }

            fields.style.display = 'none';
            loader.style.display = 'block';
            errorLog.style.display = 'none';

            try {
                const body = new FormData();
                body.append('username', user);
                body.append('password', pass);

                const response = await fetch(`http://${serverIP}/pharmora/api_login.php`, {
                    method: 'POST',
                    body: body
                });

                const data = await response.json();

                if(data.success) {
                    document.getElementById('loader-msg').textContent = "ACESSO PERMITIDO";
                    setTimeout(() => {
                        window.location.href = `http://${serverIP}/pharmora/dashboard.php`;
                    }, 1000);
                } else {
                    fail(data.message);
                }
            } catch (err) {
                fail("ERRO DE REDE: VERIFIQUE O NODO");
            }
        }

        function fail(m) {
            document.getElementById('boot-loader').style.display = 'none';
            document.getElementById('login-fields').style.display = 'block';
            const e = document.getElementById('error-log');
            e.textContent = m; e.style.display = 'block';
        }
    </script>
</body>
</html>
